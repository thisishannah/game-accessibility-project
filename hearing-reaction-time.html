<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css">
    <title>반응속도 테스트 · 청각언어 측정</title>
    <style>
      :root {
        --bg: #020617;
        --accent: #7c3aed;
        --text-main: #e5e7eb;
        --text-muted: #b8c5d6;
        --ready-bg: #1e40af;
        --click-bg: #f59e0b;
        --danger: #dc2626;
        --ok: #4ade80;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text-main);
        background: #020617;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 20px;
        padding-top: 72px;
      }
      header {
        position: absolute;
        top: 20px;
        left: 20px;
        right: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 10;
      }
      .test-container {
        width: 100%;
        max-width: 600px;
        margin-top: 0;
      }
      .instruction {
        text-align: center;
        font-size: 16px;
        font-weight: 650;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
        margin: 0 0 16px;
        color: var(--text-main);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }
      .instruction p {
        margin: 0 0 0.5em 0;
        max-width: 40rem;
      }
      .instruction p:last-child {
        margin-bottom: 0;
      }
      .instruction.instruction--hidden {
        visibility: hidden;
      }
      .test-area {
        width: 100%;
        max-width: 600px;
        height: 400px;
        min-height: 400px;
        max-height: 400px;
        flex-shrink: 0;
        overflow: hidden;
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        justify-content: center;
        padding: 20px 24px 24px;
        box-sizing: border-box;
        cursor: pointer;
        transition: background-color 0.2s;
        position: relative;
        margin-top: 0;
      }
      .test-area.waiting { background: #1e293b; cursor: wait; }
      .test-area.ready { background: var(--ready-bg); cursor: pointer; }
      .test-area.click { background: var(--click-bg); cursor: pointer; }
      .test-area.too-early { background: var(--danger); cursor: not-allowed; }
      .test-message {
        font-size: 16px;
        font-weight: 650;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
        flex: 1 1 auto;
        min-height: 0;
        width: 100%;
        padding: 0 12px;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .test-area.waiting .test-message,
      .test-area.ready .test-message,
      .test-area.too-early .test-message { color: #ffffff; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
      .test-area.click .test-message { color: #0f172a; text-shadow: 0 1px 2px rgba(255,255,255,0.2); }
      .results-panel {
        margin-top: 30px;
        padding: 20px;
        background: rgba(2, 6, 23, 0.8);
        border-radius: 16px;
        border: 1px solid rgba(51, 65, 85, 0.9);
        width: 100%;
        max-width: 600px;
      }
      .result-item {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid rgba(51, 65, 85, 0.5);
        font-size: 14px;
      }
      .result-item:last-child {
        border-bottom: none;
        font-weight: 600;
        color: var(--ok);
        margin-top: 8px;
        padding-top: 12px;
        border-top: 2px solid rgba(51, 65, 85, 0.9);
      }
      .btn-primary {
        margin-top: 20px;
        padding: 10px 20px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(120deg, #4f46e5, #7c3aed, #22c55e);
        color: white;
        font-weight: 550;
        cursor: pointer;
        font-size: 14px;
      }
      .btn-primary:hover { filter: brightness(1.1); }
      .btn-primary:disabled { opacity: 0.5; cursor: default; }
      .btn-row-results { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
      .btn-row-results .btn-primary { flex: 1; min-width: 140px; margin-top: 0; }
      .btn-retry { padding: 10px 20px; border-radius: 999px; border: 1px solid rgba(148, 163, 184, 0.6); background: rgba(30, 41, 59, 0.8); color: var(--text-main); font-weight: 550; cursor: pointer; font-size: 14px; }
      .btn-retry:hover { background: rgba(51, 65, 85, 0.9); border-color: rgba(148, 163, 184, 0.9); }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">본문으로 건너뛰기</a>
    <header>
      <a href="hearing_hub.html" class="back-btn">← 허브로 돌아가기</a>
      <p style="font-size: 12px; color: var(--text-muted); margin: 0;">반응속도 테스트</p>
    </header>

    <main id="main-content" role="main" aria-labelledby="page-title-h1" tabindex="-1">
    <h1 id="page-title-h1" class="sr-only">반응속도 테스트</h1>
    <div class="test-container" id="test-container">
      <div class="instruction" id="test-intro">
        <p>상황 변화에 얼마나 빠르게 반응하는지 그 속도를 측정하고자 합니다.</p>
        <p>색상이 변하는 즉시 화면을 클릭하면 클릭까지 걸린 시간을 계산합니다.</p>
        <p>측정은 총 4번 진행합니다.</p>
      </div>
      <div class="test-area waiting" id="test-area" role="button" tabindex="0" aria-label="반응속도 테스트 영역">
        <div class="test-message" id="test-message" aria-live="polite" aria-atomic="true">대기 중... 이곳을 클릭하면 시작합니다.</div>
      </div>
    </div>

    <div class="results-panel" id="results-panel" style="display: none;">
      <div style="font-size: 16px; font-weight: 600; margin-bottom: 12px;">측정 결과</div>
      <div id="results-list"></div>
      <div class="btn-row-results">
        <button class="btn-retry" id="retry-btn">재시도</button>
        <button class="btn-primary" id="save-btn">결과 저장 & 허브로 이동</button>
      </div>
    </div>
    </main>

    <script src="ga-storage.js"></script>
    <script>
      (function () {
        const testContainer = document.getElementById("test-container");
        const testIntro = document.getElementById("test-intro");
        const testArea = document.getElementById("test-area");
        const testMessage = document.getElementById("test-message");
        const resultsPanel = document.getElementById("results-panel");
        const resultsList = document.getElementById("results-list");
        const saveBtn = document.getElementById("save-btn");

        let state = "waiting";
        let trials = [];
        let currentTrial = 0;
        let startTime = 0;
        let waitTimeout = null;
        const TOTAL_TRIALS = 4;

        function getRandomDelay() {
          return 2000 + Math.random() * 3000;
        }

        function syncIntroVisibility() {
          var hidden = state !== "waiting";
          testIntro.classList.toggle("instruction--hidden", hidden);
          testIntro.setAttribute("aria-hidden", hidden ? "true" : "false");
        }

        function goToReady() {
          state = "ready";
          testArea.className = "test-area ready";
          testMessage.textContent = "기다리세요. 화면 색깔이 바뀌면 이곳을 클릭해 주세요.";
          syncIntroVisibility();
          startTime = Date.now();
          waitTimeout = setTimeout(function () {
            if (state === "ready") {
              state = "click";
              testArea.className = "test-area click";
              testMessage.textContent = "지금 클릭하세요!";
              startTime = Date.now();
              syncIntroVisibility();
            }
          }, getRandomDelay());
        }

        function startTrial() {
          if (currentTrial >= TOTAL_TRIALS) {
            showResults();
            return;
          }
          if (currentTrial === 0 && trials.length === 0) {
            state = "waiting";
            testArea.className = "test-area waiting";
            testMessage.textContent = "대기 중... 이곳을 클릭하면 시작합니다.";
            testArea.onclick = function () {
              testArea.onclick = null;
              goToReady();
            };
            syncIntroVisibility();
          } else {
            goToReady();
          }
        }

        testArea.addEventListener("keydown", function (e) {
          if (e.key === " " || e.key === "Enter") { e.preventDefault(); testArea.click(); }
        });
        testArea.addEventListener("click", function () {
          if (state === "click") {
            const reactionTime = Date.now() - startTime;
            trials.push(reactionTime);
            currentTrial++;
            testMessage.textContent = reactionTime + " ms";
            if (currentTrial < TOTAL_TRIALS) {
              setTimeout(function () { startTrial(); }, 2000);
            } else {
              setTimeout(function () { showResults(); }, 2000);
            }
          } else if (state === "ready") {
            clearTimeout(waitTimeout);
            state = "too-early";
            syncIntroVisibility();
            testArea.className = "test-area too-early";
            testMessage.textContent = "너무 빨랐습니다. 다시 시도합니다.";
            setTimeout(function () { goToReady(); }, 1500);
          }
        });

        function resetTest() {
          trials = [];
          currentTrial = 0;
          testContainer.style.display = "block";
          testArea.style.display = "flex";
          resultsPanel.style.display = "none";
          startTrial();
        }

        function showResults() {
          testContainer.style.display = "none";
          resultsPanel.style.display = "block";
          const avg = trials.reduce((a, b) => a + b, 0) / trials.length;
          let html = "";
          trials.forEach(function (t, i) {
            html += '<div class="result-item"><span>' + (i + 1) + "회차</span><span>" + t + " ms</span></div>";
          });
          html += '<div class="result-item"><span>평균</span><span>' + Math.round(avg) + " ms</span></div>";
          resultsList.innerHTML = html;
        }

        document.getElementById("retry-btn").addEventListener("click", resetTest);
        saveBtn.addEventListener("click", function () {
          if (trials.length < TOTAL_TRIALS) return;
          const avg = trials.reduce((a, b) => a + b, 0) / trials.length;
          const session = (typeof GAStorage !== "undefined" && GAStorage.readSession()) || {};
          if (!session.user_data) session.user_data = {};
          const hearing = session.user_data.hearing_results || {};
          hearing.reactionTime = {
            trials: trials,
            average: Math.round(avg),
            recordedAt: new Date().toISOString()
          };
          if (typeof GAStorage !== "undefined") {
            GAStorage.writeSession({ hearing: hearing });
          }
          window.location.href = "hearing_hub.html";
        });

        startTrial();
      })();
    </script>
  </body>
</html>
