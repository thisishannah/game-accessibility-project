<!DOCTYPE html>
<!-- 동시입력 v2: 펑션키(F1~F12) 제외 -->
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <link rel="stylesheet" href="style.css">
    <title>동시 입력 테스트 · 운동 측정</title>
    <style>
      :root {
        --bg: #020617;
        --accent: #7c3aed;
        --text-main: #e5e7eb;
        --text-muted: #b8c5d6;
        --ok: #4ade80;
        --danger: #f97373;
        --wait: #fbbf24;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text-main);
        background: #020617;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      header {
        position: absolute;
        top: 20px;
        left: 20px;
        right: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 10;
      }
      .test-container {
        width: 100%;
        max-width: 700px;
        margin-top: 60px;
      }
      .instruction {
        text-align: center;
        font-size: 16px;
        font-weight: 650;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        white-space: pre-line;
        font-weight: 600;
        margin-bottom: 20px;
        min-height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-main);
        white-space: pre-line;
      }
      .key-combination {
        text-align: center;
        font-size: 48px;
        min-height: 160px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        font-weight: 700;
        margin-bottom: 40px;
        padding: 30px;
        background: rgba(2, 6, 23, 0.8);
        border-radius: 16px;
        border: 2px solid rgba(148, 163, 184, 0.6);
        min-height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 10px;
      }
      .key-combination.success {
        border-color: var(--ok);
        background: rgba(74, 222, 128, 0.1);
      }
      .key-combination.failed {
        border-color: var(--danger);
        background: rgba(249, 115, 115, 0.1);
      }
      .key-combination.mouse-target {
        outline: 2px dashed rgba(148, 163, 184, 0.5);
        outline-offset: 4px;
      }
      .key-combination.mouse-target:hover {
        outline-color: var(--accent);
      }
      .key-display {
        display: inline-block;
        padding: 24px 40px;
        background: rgba(148, 163, 184, 0.2);
        border: 2px solid rgba(148, 163, 184, 0.6);
        border-radius: 8px;
        font-size: 72px;
        font-weight: 600;
        margin: 5px;
      }
      .key-display.pressed {
        background: var(--ok);
        border-color: var(--ok);
        color: #000;
      }
      .key-display.required {
        border-color: var(--wait);
        background: rgba(251, 191, 36, 0.2);
      }
      .key-display.required.pressed {
        background: var(--ok);
        border-color: var(--ok);
      }
      .plus-sign {
        font-size: 72px;
        color: var(--text-muted);
        margin: 0 5px;
      }
      .status-message {
        text-align: center;
        font-size: 48px;
        min-height: 70px;
        margin-top: 20px;
        min-height: 24px;
      }
      .status-message.success {
        color: var(--ok);
        font-weight: 600;
      }
      .status-message.failed {
        color: var(--danger);
      }
      .results-panel {
        margin-top: 30px;
        padding: 20px;
        background: rgba(2, 6, 23, 0.8);
        border-radius: 16px;
        border: 1px solid rgba(51, 65, 85, 0.9);
        width: 100%;
        display: none;
      }
      .result-item {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid rgba(51, 65, 85, 0.5);
        font-size: 14px;
      }
      .result-item:last-child {
        border-bottom: none;
        font-weight: 600;
        color: var(--ok);
        margin-top: 8px;
        padding-top: 12px;
        border-top: 2px solid rgba(51, 65, 85, 0.9);
      }
      .btn-primary {
        margin-top: 20px;
        padding: 10px 20px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(120deg, #4f46e5, #7c3aed, #22c55e);
        color: white;
        font-weight: 550;
        cursor: pointer;
        font-size: 14px;
        width: 100%;
      }
      .btn-primary:hover { filter: brightness(1.1); }
      .btn-primary:disabled { opacity: 0.5; cursor: default; }
      .retry-btn {
        margin-top: 15px;
        padding: 8px 16px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.6);
        background: rgba(2, 6, 23, 0.8);
        color: var(--text-main);
        font-weight: 500;
        cursor: pointer;
        font-size: 13px;
        width: 100%;
      }
      .retry-btn:hover {
        background: rgba(2, 6, 23, 0.95);
        border-color: rgba(148, 163, 184, 0.9);
      }
      .skip-actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 20px;
      }
      .skip-actions .retry-btn {
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">본문으로 건너뛰기</a>
    <header>
      <a href="motor_hub.html" class="back-btn">← 허브로 돌아가기</a>
      <p style="font-size: 12px; color: var(--text-muted); margin: 0;" id="page-subtitle">동시 입력 테스트</p>
    </header>

    <main id="main-content" class="test-container" role="main" aria-labelledby="page-title-h1" tabindex="-1">
      <h1 id="page-title-h1" class="sr-only">동시 입력 테스트</h1>
      <div class="instruction" id="instruction"></div>
      
      <div class="key-combination" id="key-combination" role="group" aria-label="눌러야 할 키 조합">
        <span class="key-display" id="key-display-1">-</span>
      </div>

      <div class="status-message" id="status-message" aria-live="polite" aria-atomic="true"></div>

      <div class="skip-actions" id="skip-actions">
        <button type="button" class="retry-btn" id="skip-btn">이 문제 건너뛰기</button>
        <button type="button" class="retry-btn" id="save-exit-btn">한 만큼 저장하고 나가기</button>
      </div>

      <div class="results-panel" id="results-panel">
        <div style="font-size: 16px; font-weight: 600; margin-bottom: 12px;">측정 결과</div>
        <div id="results-content"></div>
        <button class="btn-primary" id="save-btn">결과 저장 & 허브로 이동</button>
        <button class="retry-btn" id="retry-btn">다시 측정하기</button>
      </div>
    </main>

    <script src="ga-storage.js?v=2"></script>
    <script>
      (function () {
        const instruction = document.getElementById("instruction");
        const keyCombination = document.getElementById("key-combination");
        const statusMessage = document.getElementById("status-message");
        const resultsPanel = document.getElementById("results-panel");
        const resultsContent = document.getElementById("results-content");
        const saveBtn = document.getElementById("save-btn");
        const retryBtn = document.getElementById("retry-btn");

        const KEYS = ["`", "Q", "W", "E", "R", "A", "S", "D", "F", "G", "Z", "X", "C", "V", "B", "T", "Shift", "Ctrl", "Space"];
        const MOUSE_KEY = "Mouse";
        const KEY_CODE_MAP = {
          "Backquote": "`", "KeyQ": "Q", "KeyW": "W", "KeyE": "E", "KeyR": "R",
          "KeyA": "A", "KeyS": "S", "KeyD": "D", "KeyF": "F", "KeyG": "G",
          "KeyZ": "Z", "KeyX": "X", "KeyC": "C", "KeyV": "V", "KeyB": "B", "KeyT": "T",
          "ShiftLeft": "Shift", "ShiftRight": "Shift",
          "ControlLeft": "Ctrl", "ControlRight": "Ctrl",
          "Space": "Space"
        };
        /* 펑션키(F1~F12) 제외: 특수키가 키 기능을 활성화해 검사 진행이 멈춤. Ctrl+W, Ctrl+R 등 위험 조합 회피 */
        const TEST_SEQUENCE = [
          { keys: 2, mouseIncluded: false, combinations: [
            ["B", "Space"],
            ["Shift", "C"],
            ["`", "R"],
            ["Ctrl", "E"],
            ["B", "`"],
            ["Shift", "Space"],
            ["Ctrl", "Z"],
            ["`", "G"]
          ]},
          { keys: 3, mouseIncluded: false, combinations: [
            ["B", "Shift", "Space"],
            ["Ctrl", "F", "X"],
            ["`", "E", "V"],
            ["B", "Ctrl", "C"],
            ["Shift", "Space", "R"],
            ["`", "G", "X"]
          ]},
          { keys: 4, mouseIncluded: true, combinations: [
            ["Mouse", "Shift", "Space", "R"],
            ["Mouse", "B", "Ctrl", "C"],
            ["Mouse", "`", "E", "Space"],
            ["Mouse", "Shift", "V", "T"]
          ]}
        ];

        let currentTestIndex = 0;
        let currentCombinationIndex = 0;
        let pressedKeys = new Set();
        let mousePressed = false;
        let mouseLeftHeld = false;
        let mouseRightHeld = false;

        const INSTRUCTION_KEYBOARD_ONLY =
          "동시 입력 테스트입니다. 오른쪽 또는 왼쪽 손 한 쪽만 이용하여 두 개 이상의 버튼을 동시에 눌러주세요. 가능하지 않은 경우, 하단의 [이 문제 건너뛰기]버튼을 눌러 다음 문제로 넘어가실 수 있습니다.";
        const INSTRUCTION_MOUSE_AND_KEYBOARD =
          "한 손으로는 마우스를 조작하고, 다른 한 손으로는 키보드를 작동합니다. 마우스 좌 또는 우클릭을 유지한채로 키보드 버튼 2개 또는 3개를 동시에 누르세요";
        let successfulCombinations = [];
        let failedCombinations = [];
        let skippedCombinations = [];
        let allAttempts = [];
        let maxKeys = 0;
        let testCompleted = false;
        let earlyExit = false;

        function keyMatchesEvent(e) {
          const mapped = KEY_CODE_MAP[e.code];
          if (mapped) return mapped;
          if (e.key && e.key.length === 1 && /^[A-Za-z]$/.test(e.key)) {
            return e.key.toUpperCase();
          }
          return null;
        }

        const DISPLAY_LABELS = { "`": "~", "Space": "Space", "Mouse": "🖱 좌·우" };
        function updateKeyDisplay() {
          const currentTest = TEST_SEQUENCE[currentTestIndex];
          const currentCombo = currentTest.combinations[currentCombinationIndex];
          keyCombination.innerHTML = "";
          keyCombination.className = "key-combination";
          if (currentTest.mouseIncluded) {
            keyCombination.classList.add("mouse-target");
            keyCombination.style.cursor = "pointer";
            keyCombination.title = "이 영역에서 마우스 좌클릭 또는 우클릭을 누른 채 키보드 키를 동시에 누르세요";
          } else {
            keyCombination.classList.remove("mouse-target");
            keyCombination.style.cursor = "";
            keyCombination.title = "";
          }
          currentCombo.forEach(function(key, index) {
            const keyDisplay = document.createElement("span");
            keyDisplay.className = "key-display required";
            keyDisplay.id = "key-display-" + (index + 1);
            keyDisplay.textContent = DISPLAY_LABELS[key] || key;
            const isPressed = key === "Mouse" ? mousePressed : pressedKeys.has(key);
            if (isPressed) {
              keyDisplay.classList.add("pressed");
            }
            keyCombination.appendChild(keyDisplay);
            if (index < currentCombo.length - 1) {
              const plus = document.createElement("span");
              plus.className = "plus-sign";
              plus.textContent = "+";
              keyCombination.appendChild(plus);
            }
          });
        }

        function handleKeyPress(key) {
          if (testCompleted) return;
          if (key === "Mouse") return;
          if (!KEYS.includes(key)) return;
          pressedKeys.add(key);
          updateKeyDisplay();
          checkCombination();
        }

        function handleKeyRelease(key) {
          if (key === "Mouse") return;
          pressedKeys.delete(key);
          updateKeyDisplay();
        }

        function handleMouseDown(e) {
          if (testCompleted) return;
          if (e.button !== 0 && e.button !== 2) return;
          const currentTest = TEST_SEQUENCE[currentTestIndex];
          if (!currentTest.mouseIncluded) return;
          e.preventDefault();
          if (e.button === 0) mouseLeftHeld = true;
          if (e.button === 2) mouseRightHeld = true;
          mousePressed = mouseLeftHeld || mouseRightHeld;
          updateKeyDisplay();
          checkCombination();
        }

        function handleMouseUp(e) {
          if (e.button !== 0 && e.button !== 2) return;
          if (e.button === 0) mouseLeftHeld = false;
          if (e.button === 2) mouseRightHeld = false;
          mousePressed = mouseLeftHeld || mouseRightHeld;
          updateKeyDisplay();
        }

        function checkCombination() {
          const currentTest = TEST_SEQUENCE[currentTestIndex];
          const currentCombo = currentTest.combinations[currentCombinationIndex];
          const requiredKeys = new Set(currentCombo);
          const allPressed = currentCombo.every(function(key) {
            return key === "Mouse" ? mousePressed : pressedKeys.has(key);
          });
          const extraKeys = Array.from(pressedKeys).filter(function(key) { return !requiredKeys.has(key); });
          let pressedKeysArray = Array.from(pressedKeys).sort();
          if (mousePressed && requiredKeys.has("Mouse")) pressedKeysArray = ["Mouse"].concat(pressedKeysArray);

          const attempt = {
            requiredKeys: currentCombo.slice(),
            pressedKeys: pressedKeysArray,
            extraKeys: extraKeys,
            timestamp: new Date().toISOString()
          };
          allAttempts.push(attempt);

          if (allPressed && extraKeys.length === 0) {
            keyCombination.classList.add("success");
            statusMessage.textContent = "성공!";
            statusMessage.className = "status-message success";
            
            successfulCombinations.push({
              keys: currentCombo.length,
              requiredCombination: currentCombo.slice(),
              actualPressedKeys: pressedKeysArray,
              timestamp: new Date().toISOString()
            });
            
            if (currentCombo.length > maxKeys) {
              maxKeys = currentCombo.length;
            }

            setTimeout(function() {
              nextCombination();
            }, 1000);
          } else if (allPressed && extraKeys.length > 0) {
            keyCombination.classList.add("failed");
            statusMessage.textContent = "다른 키를 누르지 마세요";
            statusMessage.className = "status-message failed";
            
            failedCombinations.push({
              requiredKeys: currentCombo.slice(),
              actualPressedKeys: pressedKeysArray,
              extraKeys: extraKeys,
              timestamp: new Date().toISOString()
            });
            
            setTimeout(function() {
              resetCurrentCombination();
            }, 1500);
          } else if (!allPressed) {
            const missingKeys = currentCombo.filter(function(key) {
              return key === "Mouse" ? !mousePressed : !pressedKeys.has(key);
            });
            keyCombination.classList.add("failed");
            statusMessage.textContent = "모든 키를 동시에 누르세요";
            statusMessage.className = "status-message failed";
            
            failedCombinations.push({
              requiredKeys: currentCombo.slice(),
              actualPressedKeys: pressedKeysArray,
              missingKeys: missingKeys,
              extraKeys: extraKeys,
              timestamp: new Date().toISOString()
            });
            
            setTimeout(function() {
              resetCurrentCombination();
            }, 1500);
          }
        }

        function resetCurrentCombination() {
          pressedKeys.clear();
          mousePressed = false;
          mouseLeftHeld = false;
          mouseRightHeld = false;
          updateKeyDisplay();
          keyCombination.classList.remove("success", "failed");
          statusMessage.textContent = "";
          statusMessage.className = "status-message";
        }

        function nextCombination() {
          const currentTest = TEST_SEQUENCE[currentTestIndex];
          currentCombinationIndex++;
          
          if (currentCombinationIndex >= currentTest.combinations.length) {
            currentTestIndex++;
            currentCombinationIndex = 0;
            
            if (currentTestIndex >= TEST_SEQUENCE.length) {
              completeTest(false);
              return;
            }
          }
          
          resetCurrentCombination();
          const nextTest = TEST_SEQUENCE[currentTestIndex];
          instruction.textContent = nextTest.mouseIncluded ? INSTRUCTION_MOUSE_AND_KEYBOARD : INSTRUCTION_KEYBOARD_ONLY;
          updateKeyDisplay();
        }

        function skipCurrentCombination() {
          if (testCompleted) return;
          const currentTest = TEST_SEQUENCE[currentTestIndex];
          const currentCombo = currentTest.combinations[currentCombinationIndex];
          skippedCombinations.push({
            keys: currentCombo.length,
            requiredCombination: currentCombo.slice(),
            timestamp: new Date().toISOString()
          });
          nextCombination();
        }

        function saveAndExitEarly() {
          if (testCompleted) return;
          earlyExit = true;
          testCompleted = true;
          document.getElementById("skip-actions").style.display = "none";
          instruction.style.display = "none";
          keyCombination.style.display = "none";
          statusMessage.style.display = "none";
          resultsPanel.style.display = "block";
          resultsContent.innerHTML = "<p style='margin-bottom: 16px;'>지금까지의 결과를 저장하고 허브로 이동합니다.</p>" +
            "<div class='result-item'><span>성공한 최대 동시 입력</span><span>" + maxKeys + " 개</span></div>" +
            "<div class='result-item'><span>성공한 조합</span><span>" + successfulCombinations.length + " 개</span></div>";
          saveBtn.click();
        }

        function completeTest(isEarlyExit) {
          testCompleted = true;
          earlyExit = isEarlyExit || earlyExit;
          instruction.style.display = "none";
          keyCombination.style.display = "none";
          statusMessage.style.display = "none";
          document.getElementById("skip-actions").style.display = "none";
          resultsPanel.style.display = "block";
          
          let html = '<div class="result-item"><span>성공한 최대 동시 입력 개수</span><span>' + maxKeys + ' 개</span></div>';
          html += '<div class="result-item"><span>성공한 조합 수</span><span>' + successfulCombinations.length + ' 개</span></div>';
          html += '<div class="result-item"><span>실패한 조합 수</span><span>' + failedCombinations.length + ' 개</span></div>';
          html += '<div class="result-item"><span>건너뛴 조합 수</span><span>' + skippedCombinations.length + ' 개</span></div>';
          html += '<div class="result-item"><span>총 시도 횟수</span><span>' + allAttempts.length + ' 회</span></div>';
          if (earlyExit) {
            html += '<div class="result-item" style="color: var(--wait);"><span>종료 방식</span><span>중도 저장 (한 만큼만 진행)</span></div>';
          }
          html += '<div class="result-item" style="margin-top: 12px;"><strong>성공한 조합 목록:</strong></div>';
          successfulCombinations.forEach(function(combo, index) {
            html += '<div class="result-item" style="font-size: 12px;"><span>' + (index + 1) + '. 요구: ' + combo.requiredCombination.join(" + ") + ' | 실제: ' + combo.actualPressedKeys.join(" + ") + '</span><span>' + combo.keys + '개</span></div>';
          });
          if (failedCombinations.length > 0) {
            html += '<div class="result-item" style="margin-top: 12px;"><strong>실패한 조합 목록:</strong></div>';
            failedCombinations.slice(0, 5).forEach(function(combo, index) {
              let desc = '요구: ' + combo.requiredKeys.join(" + ");
              if (combo.missingKeys && combo.missingKeys.length > 0) {
                desc += ' | 누락: ' + combo.missingKeys.join(", ");
              }
              if (combo.extraKeys && combo.extraKeys.length > 0) {
                desc += ' | 오입력: ' + combo.extraKeys.join(", ");
              }
              html += '<div class="result-item" style="font-size: 11px; color: #9ca3af;"><span>' + (index + 1) + '. ' + desc + '</span></div>';
            });
            if (failedCombinations.length > 5) {
              html += '<div class="result-item" style="font-size: 11px; color: #9ca3af;"><span>... 외 ' + (failedCombinations.length - 5) + '개 더</span></div>';
            }
          }
          if (skippedCombinations.length > 0) {
            html += '<div class="result-item" style="margin-top: 12px;"><strong>건너뛴 조합:</strong></div>';
            skippedCombinations.slice(0, 5).forEach(function(combo, index) {
              html += '<div class="result-item" style="font-size: 11px; color: #9ca3af;"><span>' + (index + 1) + '. ' + combo.requiredCombination.join(" + ") + '</span></div>';
            });
            if (skippedCombinations.length > 5) {
              html += '<div class="result-item" style="font-size: 11px; color: #9ca3af;"><span>... 외 ' + (skippedCombinations.length - 5) + '개 더</span></div>';
            }
          }
          resultsContent.innerHTML = html;
        }

        function resetTest() {
          currentTestIndex = 0;
          currentCombinationIndex = 0;
          pressedKeys.clear();
          mousePressed = false;
          successfulCombinations = [];
          failedCombinations = [];
          skippedCombinations = [];
          allAttempts = [];
          maxKeys = 0;
          testCompleted = false;
          earlyExit = false;
          
          instruction.style.display = "block";
          instruction.textContent = TEST_SEQUENCE[0].mouseIncluded ? INSTRUCTION_MOUSE_AND_KEYBOARD : INSTRUCTION_KEYBOARD_ONLY;
          keyCombination.style.display = "flex";
          statusMessage.style.display = "block";
          document.getElementById("skip-actions").style.display = "flex";
          resultsPanel.style.display = "none";
          
          resetCurrentCombination();
          updateKeyDisplay();
        }

        document.addEventListener("keydown", function(e) {
          const matched = keyMatchesEvent(e);
          if (matched && !pressedKeys.has(matched)) {
            e.preventDefault();
            handleKeyPress(matched);
          }
        });

        document.addEventListener("keyup", function(e) {
          const matched = keyMatchesEvent(e);
          if (matched) {
            e.preventDefault();
            handleKeyRelease(matched);
          }
        });

        keyCombination.addEventListener("mousedown", handleMouseDown);
        keyCombination.addEventListener("contextmenu", function (e) {
          const currentTest = TEST_SEQUENCE[currentTestIndex];
          if (currentTest && currentTest.mouseIncluded) e.preventDefault();
        });
        document.addEventListener("mouseup", handleMouseUp);

        saveBtn.addEventListener("click", function () {
          const session = (typeof GAStorage !== "undefined" && GAStorage.readSession()) || {};
          if (!session.user_data) session.user_data = {};
          const motor = session.user_data.motor_results || {};
          motor.simultaneousInput = {
            maxKeys: maxKeys,
            successfulCombinations: successfulCombinations,
            failedCombinations: failedCombinations,
            skippedCombinations: skippedCombinations,
            allAttempts: allAttempts,
            totalSuccessful: successfulCombinations.length,
            totalFailed: failedCombinations.length,
            totalSkipped: skippedCombinations.length,
            totalAttempts: allAttempts.length,
            earlyExit: earlyExit,
            recordedAt: new Date().toISOString()
          };
          if (typeof GAStorage !== "undefined") {
            GAStorage.writeSession({ motor: motor });
          }
          window.location.href = "motor_hub.html";
        });

        retryBtn.addEventListener("click", resetTest);
        document.getElementById("skip-btn").addEventListener("click", skipCurrentCombination);
        document.getElementById("save-exit-btn").addEventListener("click", saveAndExitEarly);

        updateKeyDisplay();
        const firstTest = TEST_SEQUENCE[0];
        instruction.textContent = firstTest.mouseIncluded ? INSTRUCTION_MOUSE_AND_KEYBOARD : INSTRUCTION_KEYBOARD_ONLY;
      })();
    </script>
  </body>
</html>
