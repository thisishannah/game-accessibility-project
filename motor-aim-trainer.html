<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css">
    <title>에임 트레이너 · 운동 측정</title>
    <style>
      :root {
        --bg: #020617;
        --accent: #7c3aed;
        --text-main: #e5e7eb;
        --ok: #4ade80;
        --danger: #f97373;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text-main);
        background: #020617;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px max(8px, env(safe-area-inset-left, 8px)) 20px max(8px, env(safe-area-inset-right, 8px));
      }
      header {
        position: absolute;
        top: 20px;
        left: 20px;
        right: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 10;
      }
      .aim-wrapper {
        width: 100%;
        max-width: min(calc(100vw - 16px), 1920px);
        margin-top: 60px;
      }
      .aim-wrapper .info-panel-wrap {
        text-align: center;
        margin-bottom: 12px;
      }
      .aim-instruction {
        margin: 0 auto 14px;
        max-width: min(900px, 100%);
        font-size: 15px;
        font-weight: 500;
        line-height: 1.55;
        color: var(--text-main);
      }
      .aim-instruction-target-label {
        color: var(--ok);
        font-weight: 700;
      }
      .aim-wrapper .info-panel {
        display: inline-block;
        background: rgba(2, 6, 23, 0.9);
        padding: 10px 20px;
        border-radius: 999px;
        font-size: 16px;
        font-weight: 650;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text-main);
      }
      #game-area {
        width: 100%;
        height: min(82vh, 960px);
        min-height: 460px;
        background: #1a1a1a;
        border-radius: 16px;
        position: relative;
        cursor: crosshair;
        overflow: hidden;
      }
      .target {
        position: absolute;
        width: 40px;
        height: 40px;
        background: var(--ok);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: opacity 0.1s;
      }
      .target.hit { opacity: 0; }
      .results-panel {
        margin-top: 30px;
        padding: 20px;
        background: rgba(2, 6, 23, 0.8);
        border-radius: 16px;
        border: 1px solid rgba(51, 65, 85, 0.9);
        width: 100%;
        max-width: min(calc(100vw - 16px), 1920px);
        display: none;
      }
      .result-item {
        padding: 8px 0;
        border-bottom: 1px solid rgba(51, 65, 85, 0.5);
        font-size: 14px;
      }
      .btn-primary {
        margin-top: 20px;
        padding: 10px 20px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(120deg, #4f46e5, #7c3aed, #22c55e);
        color: white;
        font-weight: 550;
        cursor: pointer;
        font-size: 14px;
        width: 100%;
      }
      .btn-primary:hover { filter: brightness(1.1); }
      .btn-row-results { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
      .btn-row-results .btn-primary { flex: 1; min-width: 140px; margin-top: 0; }
      .btn-retry { padding: 10px 20px; border-radius: 999px; border: 1px solid rgba(148, 163, 184, 0.6); background: rgba(30, 41, 59, 0.8); color: var(--text-main); font-weight: 550; cursor: pointer; font-size: 14px; }
      .btn-retry:hover { background: rgba(51, 65, 85, 0.9); border-color: rgba(148, 163, 184, 0.9); }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">본문으로 건너뛰기</a>
    <header>
      <a href="motor_hub.html" class="back-btn">← 허브로 돌아가기</a>
      <p style="font-size: 12px; color: #9ca3af; margin: 0;">에임 트레이너</p>
    </header>

    <main id="main-content" role="main" aria-labelledby="page-title-h1" tabindex="-1">
    <h1 id="page-title-h1" class="sr-only">에임 트레이너</h1>
    <div class="aim-wrapper" id="aim-wrapper">
      <div class="info-panel-wrap">
        <p class="aim-instruction" id="aim-instruction-text">화면에 나타난 <span class="aim-instruction-target-label">초록색 동그라미</span>를 마우스로 최대한 빠르게 클릭하세요. 총 15번 측정합니다.</p>
        <div class="info-panel" id="info-panel" aria-live="polite" aria-atomic="true">타겟: 0/15</div>
      </div>
      <div id="game-area" role="application" aria-label="에임 트레이너 클릭 영역" aria-describedby="aim-instruction-text"></div>
    </div>

    <div class="results-panel" id="results-panel">
      <div style="font-size: 16px; font-weight: 600; margin-bottom: 12px;">측정 결과</div>
      <div id="results-content"></div>
      <div class="btn-row-results">
        <button class="btn-retry" id="retry-btn">재시도</button>
        <button class="btn-primary" id="save-btn">결과 저장 & 허브로 이동</button>
      </div>
    </div>
    </main>

    <script src="ga-storage.js"></script>
    <script>
      (function () {
        const gameArea = document.getElementById("game-area");
        const infoPanel = document.getElementById("info-panel");
        const resultsPanel = document.getElementById("results-panel");
        const resultsContent = document.getElementById("results-content");
        const saveBtn = document.getElementById("save-btn");

        let targets = [];
        let currentTarget = 0;
        let startTime = 0;
        let lastClickTime = 0;
        let failedClicks = 0;
        const TOTAL_TARGETS = 15;
        const TARGET_WIDTH_PX = 40;
        const targetPositions = [];

        function computeFittsLawMetrics(positions, hitsWithTiming, targetWidthPx) {
          const W = Math.max(1, targetWidthPx);
          const trials = [];
          for (let i = 1; i < positions.length && i < hitsWithTiming.length; i++) {
            const p0 = positions[i - 1];
            const p1 = positions[i];
            const D = Math.sqrt(Math.pow(p1.x - p0.x, 2) + Math.pow(p1.y - p0.y, 2));
            const tRow = hitsWithTiming[i];
            const mt = tRow && tRow.timeSinceLast;
            if (mt == null || mt <= 0) continue;
            const ID = Math.log2(D / W + 1);
            const MTsec = mt / 1000;
            const tp = MTsec > 0 ? ID / MTsec : null;
            trials.push({
              fromIndex: i - 1,
              toIndex: i,
              distancePx: Math.round(D * 100) / 100,
              movementTimeMs: mt,
              indexOfDifficulty: Math.round(ID * 1000) / 1000,
              throughput_bps: tp != null ? Math.round(tp * 100) / 100 : null
            });
          }
          if (trials.length === 0) return null;
          const withTp = trials.filter(function (t) { return t.throughput_bps != null; });
          const meanID = trials.reduce(function (a, b) { return a + b.indexOfDifficulty; }, 0) / trials.length;
          const meanTp = withTp.length
            ? withTp.reduce(function (a, b) { return a + b.throughput_bps; }, 0) / withTp.length
            : null;
          const sumID = trials.reduce(function (a, b) { return a + b.indexOfDifficulty; }, 0);
          const sumMTsec = trials.reduce(function (a, b) { return a + b.movementTimeMs / 1000; }, 0);
          return {
            formulation: "Shannon_ID_log2_D_over_W_plus_1",
            targetWidthPx: W,
            trials: trials,
            meanIndexOfDifficulty: Math.round(meanID * 1000) / 1000,
            meanThroughput_bps: meanTp != null ? Math.round(meanTp * 100) / 100 : null,
            effectiveThroughput_bps: sumMTsec > 0 ? Math.round((sumID / sumMTsec) * 100) / 100 : null
          };
        }

        function getRandomPosition() {
          const TARGET_RADIUS = TARGET_WIDTH_PX / 2;
          const margin = TARGET_RADIUS + 4;
          const w = gameArea.clientWidth;
          const h = gameArea.clientHeight;
          const spanX = Math.max(0, w - margin * 2);
          const spanY = Math.max(0, h - margin * 2);
          return {
            x: margin + Math.random() * spanX,
            y: margin + Math.random() * spanY
          };
        }

        function spawnTarget() {
          if (currentTarget >= TOTAL_TARGETS) {
            showResults();
            return;
          }
          const pos = getRandomPosition();
          targetPositions.push({ x: pos.x, y: pos.y, index: currentTarget });
          const target = document.createElement("div");
          target.className = "target";
          target.style.left = pos.x + "px";
          target.style.top = pos.y + "px";
          gameArea.appendChild(target);
          if (currentTarget === 0) {
            startTime = Date.now();
            lastClickTime = startTime;
          }
          infoPanel.textContent = "타겟: " + currentTarget + "/" + TOTAL_TARGETS;
        }

        gameArea.addEventListener("click", function (e) {
          const target = gameArea.querySelector(".target:not(.hit)");
          if (!target) return;
          const rect = gameArea.getBoundingClientRect();
          const clickX = e.clientX - rect.left;
          const clickY = e.clientY - rect.top;
          const targetX = parseFloat(target.style.left);
          const targetY = parseFloat(target.style.top);
          const dist = Math.sqrt(Math.pow(clickX - targetX, 2) + Math.pow(clickY - targetY, 2));
          const TARGET_RADIUS = TARGET_WIDTH_PX / 2;
          if (dist <= TARGET_RADIUS) {
            const now = Date.now();
            const timeSinceLast = currentTarget === 0 ? 0 : now - lastClickTime;
            targets.push({
              index: currentTarget,
              timeSinceLast: timeSinceLast,
              position: { x: targetX, y: targetY },
              clickedAt: now
            });
            target.classList.add("hit");
            setTimeout(function () {
              target.remove();
              currentTarget++;
              spawnTarget();
            }, 50);
            lastClickTime = now;
          } else {
            failedClicks++;
          }
        });

        function resetTest() {
          targets = [];
          currentTarget = 0;
          failedClicks = 0;
          targetPositions.length = 0;
          gameArea.querySelectorAll(".target").forEach(function (el) { el.remove(); });
          document.getElementById("aim-wrapper").style.display = "block";
          resultsPanel.style.display = "none";
          spawnTarget();
        }

        function showResults() {
          document.getElementById("aim-wrapper").style.display = "none";
          resultsPanel.style.display = "block";
          const totalTime = Date.now() - startTime;
          const intervals = targets.map(function (t) { return t.timeSinceLast; }).slice(1);
          const avgInterval = intervals.length > 0 ? intervals.reduce(function (a, b) { return a + b; }, 0) / intervals.length : 0;
          let html = '<div class="result-item"><strong>전체 소요 시간:</strong> ' + totalTime + ' ms</div>';
          html += '<div class="result-item"><strong>평균 구간 시간:</strong> ' + Math.round(avgInterval) + ' ms</div>';
          html += '<div class="result-item"><strong>클릭 실패 횟수:</strong> ' + failedClicks + ' 회</div>';
          html += '<div class="result-item" style="margin-top: 12px;"><strong>타겟 위치 데이터 (JSON):</strong></div>';
          html += '<pre style="background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; font-size: 11px; overflow-x: auto;">' + JSON.stringify(targetPositions, null, 2) + '</pre>';
          resultsContent.innerHTML = html;
        }

        document.getElementById("retry-btn").addEventListener("click", resetTest);
        saveBtn.addEventListener("click", function () {
          if (targets.length < TOTAL_TARGETS) return;
          const totalTime = Date.now() - startTime;
          const intervals = targets.map(function (t) { return t.timeSinceLast; }).slice(1);
          const avgInterval = intervals.length > 0 ? intervals.reduce(function (a, b) { return a + b; }, 0) / intervals.length : 0;
          const fittsLaw = computeFittsLawMetrics(targetPositions, targets, TARGET_WIDTH_PX);
          const session = (typeof GAStorage !== "undefined" && GAStorage.readSession()) || {};
          if (!session.user_data) session.user_data = {};
          const motor = session.user_data.motor_results || {};
          motor.aimTrainer = {
            totalTime: totalTime,
            averageInterval: Math.round(avgInterval),
            intervals: intervals,
            failedClicks: failedClicks,
            targets: targetPositions,
            fittsLaw: fittsLaw,
            error_pattern: failedClicks > 0 ? {
              source: "motor_aim_trainer",
              events: [{
                confused_what_with_what: {
                  intended: "현재_표적_원_내부_클릭",
                  mistaken_as: "표적_외부_클릭_또는_오클릭",
                  failed_click_count: failedClicks
                }
              }]
            } : { source: "motor_aim_trainer", events: [] },
            recordedAt: new Date().toISOString()
          };
          if (typeof GAStorage !== "undefined") {
            GAStorage.writeSession({ motor: motor });
          }
          window.location.href = "motor_hub.html";
        });

        spawnTarget();
      })();
    </script>
  </body>
</html>
